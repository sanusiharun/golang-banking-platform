# docker-compose.yml — microservices stack.
#
# Contains: all banking platform microservices
# Requires: infra stack running first (make infra-up)
#
# NOTE: PostgreSQL is NOT managed here.
# Use your existing Docker Desktop postgres-db container (localhost:5432).
#
# Start:  make services-up
# Stop:   make services-down
# Logs:   docker compose logs -f

networks:
  banking-net:
    external: true   # created by docker-compose.infra.yml

services:

  # ──────────────────────────────────────────────────────────────────────────
  # auth-svc
  # API:     http://localhost:8082
  # Metrics: http://localhost:8082/metrics  ← scraped by Prometheus
  #
  # Owns the users table (authdb). Issues RS256 JWTs.
  # POST /auth/login → returns signed JWT for use by all other services.
  # ──────────────────────────────────────────────────────────────────────────
  auth-svc:
    build:
      context: .
      dockerfile: services/auth-svc/Dockerfile
    container_name: banking-auth-svc
    restart: unless-stopped
    networks:
      - banking-net
    environment:
      SERVICE_NAME: auth-svc
      SERVICE_VERSION: "1.0.0"
      ENVIRONMENT: local
      HTTP_PORT: "8082"
      LOG_LEVEL: info
      LOG_FORMAT: json
      DB_HOST: host.docker.internal
      DB_PORT: "5432"
      DB_NAME: banking_auth
      DB_USER: auth_svc
      DB_PASSWORD: auth_svc_pass_local
      DB_SSLMODE: disable
      DB_MAX_CONNS: "10"
      DB_MIN_CONNS: "2"
      JWT_PRIVATE_KEY_B64: ""
      JWT_ISSUER: banking-platform
      JWT_TOKEN_TTL: 24h
      OTEL_ENABLED: "true"
      OTEL_LOGS_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      OTEL_SAMPLING_RATE: "1.0"
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/healthz/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ──────────────────────────────────────────────────────────────────────────
  # account-svc
  # API:     http://localhost:8081
  # Metrics: http://localhost:8081/metrics  ← scraped by Prometheus
  #
  # Verifies RS256 JWTs using the PUBLIC key. Never issues tokens.
  # Call auth-svc first to get a token, then use it here.
  # ──────────────────────────────────────────────────────────────────────────
  account-svc:
    build:
      context: .
      dockerfile: services/account-svc/Dockerfile
    container_name: banking-account-svc
    restart: unless-stopped
    networks:
      - banking-net
    depends_on:
      auth-svc:
        condition: service_healthy
    environment:
      SERVICE_NAME: account-svc
      SERVICE_VERSION: "1.0.0"
      ENVIRONMENT: local
      HTTP_PORT: "8081"
      LOG_LEVEL: info
      LOG_FORMAT: json
      DB_HOST: host.docker.internal
      DB_PORT: "5432"
      DB_NAME: banking_accounts
      DB_USER: account_svc
      DB_PASSWORD: account_svc_pass_local
      DB_SSLMODE: disable
      DB_MAX_CONNS: "25"
      DB_MIN_CONNS: "5"
      JWT_PUBLIC_KEY_B64: ""
      JWT_ISSUER: banking-platform
      RATE_LIMIT_RPS: "1000"
      RATE_LIMIT_BURST: "2000"
      OTEL_ENABLED: "true"
      OTEL_LOGS_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      OTEL_SAMPLING_RATE: "1.0"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Add future microservices below ────────────────────────────────────────
  # payment-svc — add JWT_PUBLIC_KEY_B64 (same value as account-svc above)
  #
  # notification-svc:
  #   build: ...
