# docker-compose.yml — microservices stack.
#
# Requires:  make infra-up  (starts observability + Postgres network)
# Env vars:  loaded from root .env (copy from .env.example)
#
# Start:  make services-up
# Stop:   make services-down
# Logs:   make services-logs

networks:
  banking-net:
    external: true

services:

  # ──────────────────────────────────────────────────────────────────────────
  # auth-svc — RS256 JWT issuance (port 8082)
  # ──────────────────────────────────────────────────────────────────────────
  auth-svc:
    build:
      context: .
      dockerfile: services/auth-svc/Dockerfile
    container_name: banking-auth-svc
    restart: unless-stopped
    networks:
      - banking-net
    environment:
      SERVICE_NAME: auth-svc
      SERVICE_VERSION: "1.0.0"
      ENVIRONMENT: local
      HTTP_PORT: "8082"
      LOG_LEVEL: info
      LOG_FORMAT: json
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_NAME: ${AUTH_DB_NAME}
      DB_USER: ${AUTH_DB_USER}
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      DB_SSLMODE: disable
      DB_MAX_CONNS: "10"
      DB_MIN_CONNS: "2"
      JWT_PRIVATE_KEY_B64: ${JWT_PRIVATE_KEY_B64}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL}
      JWT_REFRESH_TOKEN_TTL: ${JWT_REFRESH_TOKEN_TTL}
      OTEL_ENABLED: ${OTEL_ENABLED}
      OTEL_LOGS_ENABLED: ${OTEL_LOGS_ENABLED}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_SAMPLING_RATE: ${OTEL_SAMPLING_RATE}
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/healthz/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ──────────────────────────────────────────────────────────────────────────
  # account-svc — account management, JWT verification (port 8081)
  # ──────────────────────────────────────────────────────────────────────────
  account-svc:
    build:
      context: .
      dockerfile: services/account-svc/Dockerfile
    container_name: banking-account-svc
    restart: unless-stopped
    networks:
      - banking-net
    depends_on:
      auth-svc:
        condition: service_healthy
    environment:
      SERVICE_NAME: account-svc
      SERVICE_VERSION: "1.0.0"
      ENVIRONMENT: local
      HTTP_PORT: "8081"
      LOG_LEVEL: info
      LOG_FORMAT: json
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_NAME: ${ACCOUNT_DB_NAME}
      DB_USER: ${ACCOUNT_DB_USER}
      DB_PASSWORD: ${ACCOUNT_DB_PASSWORD}
      DB_SSLMODE: disable
      DB_MAX_CONNS: "25"
      DB_MIN_CONNS: "5"
      JWT_PUBLIC_KEY_B64: ${JWT_PUBLIC_KEY_B64}
      JWT_ISSUER: ${JWT_ISSUER}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST}
      OTEL_ENABLED: ${OTEL_ENABLED}
      OTEL_LOGS_ENABLED: ${OTEL_LOGS_ENABLED}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_SAMPLING_RATE: ${OTEL_SAMPLING_RATE}
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

