syntax = "proto3";

package banking.v1;

option go_package = "github.com/sanusi/banking/gen/banking/v1;bankingv1";

import "google/protobuf/timestamp.proto";

// AccountService provides gRPC operations for account management.
// This proto is for future gRPC transport; the primary interface today is HTTP/JSON.
service AccountService {
  rpc CreateAccount  (CreateAccountRequest)  returns (CreateAccountResponse);
  rpc GetAccount     (GetAccountRequest)     returns (GetAccountResponse);
  rpc GetBalance     (GetBalanceRequest)     returns (GetBalanceResponse);
  rpc Credit         (CreditRequest)         returns (CreditResponse);
  rpc Debit          (DebitRequest)          returns (DebitResponse);
  rpc Transfer       (TransferRequest)       returns (TransferResponse);
  rpc ListAccounts   (ListAccountsRequest)   returns (ListAccountsResponse);
}

// ─── Enums ────────────────────────────────────────────────────────────────────

enum AccountStatus {
  ACCOUNT_STATUS_UNSPECIFIED = 0;
  ACCOUNT_STATUS_PENDING     = 1;
  ACCOUNT_STATUS_ACTIVE      = 2;
  ACCOUNT_STATUS_SUSPENDED   = 3;
  ACCOUNT_STATUS_CLOSED      = 4;
}

enum TransactionType {
  TRANSACTION_TYPE_UNSPECIFIED = 0;
  TRANSACTION_TYPE_CREDIT      = 1;
  TRANSACTION_TYPE_DEBIT       = 2;
}

// ─── Messages ─────────────────────────────────────────────────────────────────

message Account {
  string                    id          = 1;
  string                    customer_id = 2;
  string                    iban        = 3;
  string                    currency    = 4;  // ISO 4217
  int64                     balance     = 5;  // minor units
  AccountStatus             status      = 6;
  google.protobuf.Timestamp created_at  = 7;
  google.protobuf.Timestamp updated_at  = 8;
}

message Transaction {
  string                    id              = 1;
  string                    account_id      = 2;
  TransactionType           type            = 3;
  int64                     amount          = 4;
  int64                     balance_after   = 5;
  string                    currency        = 6;
  string                    reference       = 7;
  string                    counterparty_id = 8;
  google.protobuf.Timestamp created_at      = 9;
}

// ─── Request / Response messages ──────────────────────────────────────────────

message CreateAccountRequest {
  string customer_id      = 1;
  string iban             = 2;
  string currency         = 3;
  int64  initial_balance  = 4;
  string idempotency_key  = 5;
}

message CreateAccountResponse {
  Account account = 1;
}

message GetAccountRequest {
  string account_id = 1;
}

message GetAccountResponse {
  Account account = 1;
}

message GetBalanceRequest {
  string account_id = 1;
}

message GetBalanceResponse {
  string account_id     = 1;
  string currency       = 2;
  int64  balance        = 3;  // minor units
  string balance_str    = 4;  // formatted e.g. "100.50"
}

message CreditRequest {
  string account_id      = 1;
  int64  amount          = 2;
  string currency        = 3;
  string reference       = 4;
  string idempotency_key = 5;
}

message CreditResponse {
  Transaction transaction = 1;
}

message DebitRequest {
  string account_id      = 1;
  int64  amount          = 2;
  string currency        = 3;
  string reference       = 4;
  string idempotency_key = 5;
}

message DebitResponse {
  Transaction transaction = 1;
}

message TransferRequest {
  string source_account_id      = 1;
  string destination_account_id = 2;
  int64  amount                 = 3;
  string currency               = 4;
  string reference              = 5;
  string idempotency_key        = 6;
}

message TransferResponse {
  Transaction transaction = 1;
}

message ListAccountsRequest {
  string customer_id = 1;  // filter by customer; empty for all
  int32  page        = 2;
  int32  page_size   = 3;
}

message ListAccountsResponse {
  repeated Account accounts    = 1;
  int64            total_count = 2;
  int32            total_pages = 3;
}
