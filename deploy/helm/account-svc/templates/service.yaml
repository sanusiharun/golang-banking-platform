apiVersion: v1
kind: Service
metadata:
  name: {{ include "account-svc.fullname" . }}
  labels:
    {{- include "account-svc.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "account-svc.selectorLabels" . | nindent 4 }}
