global:
  resolve_timeout: 1m

# ── Routing tree ──────────────────────────────────────────────────────────────
#
# Flow: alert fires → Alertmanager → alertmanager-discord proxy → Discord webhook
# The proxy (benjojo/alertmanager-discord) translates Alertmanager JSON → Discord embed format.
#
route:
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "discord-warning"

  routes:
    # Critical — fire fast, re-notify every hour
    - matchers:
        - severity = "critical"
      receiver: "discord-critical"
      group_wait: 10s
      repeat_interval: 1h

    # Warning — standard cadence
    - matchers:
        - severity = "warning"
      receiver: "discord-warning"
      repeat_interval: 4h

# ── Receivers ─────────────────────────────────────────────────────────────────
#
# Alertmanager sends to alertmanager-discord (container on banking-net).
# That proxy reformats the payload and forwards to Discord's webhook API.
#
receivers:
  - name: "discord-critical"
    webhook_configs:
      - url: "http://alertmanager-discord:9094/alert"
        send_resolved: true

  - name: "discord-warning"
    webhook_configs:
      - url: "http://alertmanager-discord:9094/alert"
        send_resolved: true

# ── Inhibition rules ──────────────────────────────────────────────────────────
# Suppress warnings when a critical for the same service is already firing.
inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["service"]
