global:
  # How long to wait before re-sending an alert that has already been sent.
  resolve_timeout: 5m

# ── Routing tree ──────────────────────────────────────────────────────────────
# Alerts flow: root route → first matching child route → receiver.
# The "catch-all" receiver here is a no-op (null) — alerts still appear in the
# Alertmanager UI at http://localhost:9093. Wire real receivers (Slack, PagerDuty,
# email) by adding receivers below and routing to them.
route:
  group_by: ["alertname", "service"]
  group_wait: 30s       # wait to batch alerts in the same group
  group_interval: 5m    # how often to resend firing group
  repeat_interval: 4h   # how often to re-notify if still firing

  receiver: "null"      # default: show in UI, no external notification

  routes:
    # Critical alerts: fire immediately, re-notify every hour
    - matchers:
        - severity = "critical"
      receiver: "null"        # swap with "slack-critical" or "pagerduty" when ready
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts: standard cadence
    - matchers:
        - severity = "warning"
      receiver: "null"
      repeat_interval: 4h

# ── Receivers ─────────────────────────────────────────────────────────────────
receivers:
  # null receiver — alerts show up in the Alertmanager UI without any external
  # notification. Replace or supplement with real receivers:
  #
  #   slack-critical:
  #     slack_configs:
  #       - api_url: "https://hooks.slack.com/services/..."
  #         channel: "#alerts-critical"
  #         title: "{{ .GroupLabels.alertname }}"
  #         text: "{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}"
  #
  #   pagerduty:
  #     pagerduty_configs:
  #       - service_key: "<your-key>"
  #
  - name: "null"

# ── Inhibition rules ──────────────────────────────────────────────────────────
# Suppress warning-severity alerts when a critical alert for the same service
# is already firing — prevents alert storms from a single root cause.
inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["service"]
