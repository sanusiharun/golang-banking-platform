global:
  scrape_interval: 15s
  evaluation_interval: 15s
  # Label applied to all time series scraped from this Prometheus instance.
  external_labels:
    environment: local
    cluster: banking-platform

# ── Alertmanager connection ───────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ── Alert rule files ──────────────────────────────────────────────────────────
# Rules are hot-reloadable: POST http://localhost:9090/-/reload (requires --web.enable-lifecycle)
rule_files:
  - "/etc/prometheus/rules/*.yml"

# ── Scrape targets ────────────────────────────────────────────────────────────
scrape_configs:

  # account-svc
  # • Local dev (make run):  target = host.docker.internal:8081  ← current default
  # • Full docker-compose:   target = account-svc:8081
  # Change the target below to match how you're running the service.
  - job_name: "account-svc"
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8081"]
        labels:
          service: account-svc
          team: platform

  # auth-svc — token issuance (RS256 JWT)
  - job_name: "auth-svc"
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8082"]
        labels:
          service: auth-svc
          team: platform

  # ── Add new microservices here following the same pattern ────────────────
  # When running via docker-compose:   target = {service-name}:{port}
  # When running locally (make run):   target = host.docker.internal:{port}
  #
  # - job_name: "payment-svc"
  #   scrape_interval: 10s
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ["host.docker.internal:8082"]
  #       labels:
  #         service: payment-svc
  #         team: platform
  #
  # - job_name: "notification-svc"
  #   scrape_interval: 10s
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ["host.docker.internal:8083"]
  #       labels:
  #         service: notification-svc
  #         team: platform

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Alertmanager self-monitoring
  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]
