groups:
  - name: auth-svc
    interval: 15s
    rules:

      # ── 1. Service Down ───────────────────────────────────────────────────────
      - alert: AuthSvcDown
        expr: up{job="auth-svc"} == 0
        for: 1m
        labels:
          severity: critical
          service: auth-svc
          team: platform
        annotations:
          summary: "auth-svc is unreachable"
          description: "Prometheus cannot scrape auth-svc for >1m. All authentication is blocked."
          runbook: "https://wiki.internal/runbooks/auth-svc-down"

      # ── 2. High 5xx Error Rate ────────────────────────────────────────────────
      - alert: AuthSvcHighErrorRate
        expr: |
          (
            sum(rate(auth_svc_http_requests_total{status=~"5.."}[5m]))
            /
            sum(rate(auth_svc_http_requests_total[5m]))
          ) > 0.01
        for: 2m
        labels:
          severity: critical
          service: auth-svc
          team: platform
        annotations:
          summary: "auth-svc 5xx error rate above 1%"
          description: >
            5xx error rate is {{ $value | humanizePercentage }} over the last 5m.
            Login and token refresh are failing at scale.
          runbook: "https://wiki.internal/runbooks/auth-svc-errors"

      # ── 3. High Login Failure Rate ────────────────────────────────────────────
      # Fires when 4xx on /auth/login exceeds 20% — possible brute-force attack
      # or a broken client sending bad credentials en masse.
      - alert: AuthSvcHighLoginFailureRate
        expr: |
          (
            sum(rate(auth_svc_http_requests_total{path="/auth/login", status=~"4.."}[5m]))
            /
            sum(rate(auth_svc_http_requests_total{path="/auth/login"}[5m]))
          ) > 0.20
        for: 2m
        labels:
          severity: warning
          service: auth-svc
          team: platform
        annotations:
          summary: "auth-svc login failure rate above 20%"
          description: >
            {{ $value | humanizePercentage }} of login attempts are failing (4xx).
            Could indicate a brute-force attack, credential stuffing, or a
            misconfigured client. Review auth-svc WARN logs for patterns.
          runbook: "https://wiki.internal/runbooks/auth-svc-login-failures"

      # ── 4. P90 Latency ────────────────────────────────────────────────────────
      - alert: AuthSvcHighLatencyP90
        expr: |
          histogram_quantile(
            0.90,
            sum by (le) (rate(auth_svc_http_request_duration_seconds_bucket[5m]))
          ) > 0.5
        for: 2m
        labels:
          severity: warning
          service: auth-svc
          team: platform
        annotations:
          summary: "auth-svc P90 latency above 500ms"
          description: >
            P90 latency is {{ $value | humanizeDuration }}.
            Auth is on the hot path for every API call — latency here cascades
            to all downstream services. Check bcrypt cost and DB query times.
          runbook: "https://wiki.internal/runbooks/auth-svc-latency"

      # ── 5. P99 Latency ────────────────────────────────────────────────────────
      - alert: AuthSvcHighLatencyP99
        expr: |
          histogram_quantile(
            0.99,
            sum by (le) (rate(auth_svc_http_request_duration_seconds_bucket[5m]))
          ) > 2.0
        for: 2m
        labels:
          severity: critical
          service: auth-svc
          team: platform
        annotations:
          summary: "auth-svc P99 latency above 2s"
          description: >
            P99 latency is {{ $value | humanizeDuration }}.
            Auth tail latency is critically high — end users will see login timeouts.
          runbook: "https://wiki.internal/runbooks/auth-svc-latency"

      # ── 6. Zero Traffic ───────────────────────────────────────────────────────
      - alert: AuthSvcNoTraffic
        expr: |
          sum(rate(auth_svc_http_requests_total[5m])) == 0
        for: 5m
        labels:
          severity: warning
          service: auth-svc
          team: platform
        annotations:
          summary: "auth-svc receiving zero traffic"
          description: >
            No HTTP requests to auth-svc in the last 5m. May indicate a routing
            misconfiguration or upstream service failure.
