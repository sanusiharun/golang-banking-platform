groups:
  - name: account-svc
    interval: 15s
    rules:

      # ── 1. Service Down ───────────────────────────────────────────────────────
      - alert: AccountSvcDown
        expr: up{job="account-svc"} == 0
        for: 1m
        labels:
          severity: critical
          service: account-svc
          team: platform
        annotations:
          summary: "account-svc is unreachable"
          description: "Prometheus cannot scrape account-svc for >1m. Service may be crashed or OOM-killed."
          runbook: "https://wiki.internal/runbooks/account-svc-down"

      # ── 2. High 5xx Error Rate ────────────────────────────────────────────────
      # Fires when 5xx responses exceed 1% of total traffic over 5 minutes.
      # 1% = 99% success SLO. Adjust threshold to match your error budget.
      - alert: AccountSvcHighErrorRate
        expr: |
          (
            sum(rate(account_svc_http_requests_total{status=~"5.."}[5m]))
            /
            sum(rate(account_svc_http_requests_total[5m]))
          ) > 0.01
        for: 2m
        labels:
          severity: critical
          service: account-svc
          team: platform
        annotations:
          summary: "account-svc 5xx error rate above 1%"
          description: >
            5xx error rate is {{ $value | humanizePercentage }} over the last 5m.
            Exceeds 99% success SLO. Check logs: {job="account-svc", level="ERROR"}.
          runbook: "https://wiki.internal/runbooks/account-svc-errors"

      # ── 3. High P90 Latency ───────────────────────────────────────────────────
      - alert: AccountSvcHighLatencyP90
        expr: |
          histogram_quantile(
            0.90,
            sum by (le) (rate(account_svc_http_request_duration_seconds_bucket[5m]))
          ) > 1.0
        for: 2m
        labels:
          severity: warning
          service: account-svc
          team: platform
        annotations:
          summary: "account-svc P90 latency above 1s"
          description: >
            P90 latency is {{ $value | humanizeDuration }} over the last 5m.
            Investigate slow DB queries or downstream timeouts.
          runbook: "https://wiki.internal/runbooks/account-svc-latency"

      # ── 4. High P99 Latency ───────────────────────────────────────────────────
      - alert: AccountSvcHighLatencyP99
        expr: |
          histogram_quantile(
            0.99,
            sum by (le) (rate(account_svc_http_request_duration_seconds_bucket[5m]))
          ) > 3.0
        for: 2m
        labels:
          severity: critical
          service: account-svc
          team: platform
        annotations:
          summary: "account-svc P99 latency above 3s"
          description: >
            P99 latency is {{ $value | humanizeDuration }} over the last 5m.
            Tail latency this high will affect end-user experience significantly.
          runbook: "https://wiki.internal/runbooks/account-svc-latency"

      # ── 5. Request Pile-Up ────────────────────────────────────────────────────
      # Early warning: goroutine pressure building before latency spikes appear.
      - alert: AccountSvcRequestPileUp
        expr: |
          sum(account_svc_http_requests_in_flight) > 100
        for: 1m
        labels:
          severity: warning
          service: account-svc
          team: platform
        annotations:
          summary: "account-svc has >100 in-flight requests"
          description: >
            {{ $value }} requests currently in-flight. Possible DB pool exhaustion
            or slow downstream dependency causing request pile-up.
          runbook: "https://wiki.internal/runbooks/account-svc-inflight"

      # ── 6. Zero Traffic ───────────────────────────────────────────────────────
      # Fires during business hours when the service receives no requests.
      # Catches silent failures (misconfigured load balancer, DNS issue).
      - alert: AccountSvcNoTraffic
        expr: |
          sum(rate(account_svc_http_requests_total[5m])) == 0
        for: 5m
        labels:
          severity: warning
          service: account-svc
          team: platform
        annotations:
          summary: "account-svc receiving zero traffic"
          description: >
            No HTTP requests in the last 5m. This may indicate a routing or
            load balancer misconfiguration, or an upstream service failure.
