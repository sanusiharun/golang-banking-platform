# ─────────────────────────────────────────────────────────────────────────────
# Promtail — dual-mode log collector
#
# MODE A — Docker containers (when running via docker compose up):
#   Discovers banking-* containers via Docker socket.
#
# MODE B — Local processes (when running via go run / make run):
#   Reads log files from ./logs/*.log (mounted at /var/log/banking).
#   Services must write to these files — see Makefile run-* targets.
#
# Both modes run simultaneously; whichever source has data wins.
# ─────────────────────────────────────────────────────────────────────────────

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchsize: 102400
    batchwait: 1s

scrape_configs:

  # ────────────────────────────────────────────────────────────────────────────
  # MODE A: Docker container log discovery
  # Picks up any container whose name starts with "banking-"
  # ────────────────────────────────────────────────────────────────────────────
  - job_name: banking-docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["banking-"]

    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/?(.*)'
        target_label: container

      # banking-account-svc → account-svc
      - source_labels: [__meta_docker_container_name]
        regex: '/?banking-(.*)'
        target_label: job
        replacement: '${1}'

      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream

    pipeline_stages:
      - json:
          expressions:
            level:    level
            msg:      msg
            trace_id: trace_id
            span_id:  span_id
      - labels:
          level:
          trace_id:
      - drop:
          expression: '.*(GET /healthz|GET /metrics).*'
          drop_counter_reason: healthcheck_noise
      - timestamp:
          source: time
          format: RFC3339Nano
          fallback_formats: [RFC3339, "2006-01-02T15:04:05Z"]

  # ────────────────────────────────────────────────────────────────────────────
  # MODE B: Local log files  (./logs/*.log mounted at /var/log/banking)
  # Each service writes to logs/<service-name>.log via: make run-auth-svc
  # ────────────────────────────────────────────────────────────────────────────
  - job_name: banking-local
    static_configs:
      - targets: [localhost]
        labels:
          job: account-svc
          source: local
          __path__: /var/log/banking/account-svc.log

      - targets: [localhost]
        labels:
          job: auth-svc
          source: local
          __path__: /var/log/banking/auth-svc.log

    pipeline_stages:
      - json:
          expressions:
            level:    level
            msg:      msg
            trace_id: trace_id
            span_id:  span_id
      - labels:
          level:
          trace_id:
      - drop:
          expression: '.*(GET /healthz|GET /metrics).*'
          drop_counter_reason: healthcheck_noise
      - timestamp:
          source: time
          format: RFC3339Nano
          fallback_formats: [RFC3339, "2006-01-02T15:04:05Z"]
