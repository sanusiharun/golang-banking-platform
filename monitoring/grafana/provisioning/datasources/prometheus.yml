apiVersion: 1

datasources:
  # ── Prometheus — metrics ──────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  # ── Alertmanager — active alerts, silences, receivers ────────────────────
  # Grafana → Alerting → Alerts (contact points, alert groups, silences)
  - name: Alertmanager
    type: alertmanager
    access: proxy
    url: http://alertmanager:9093
    editable: true
    jsonData:
      implementation: prometheus   # tells Grafana this is a Prometheus-compatible AM

  # ── Loki — logs ──────────────────────────────────────────────────────────
  # Grafana → Explore → select Loki → search by service, level, or any field
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      derivedFields:
        # Clicking trace_id in a log line opens the trace in the Jaeger datasource.
        # url: "${__value.raw}" — tells Grafana to pass the regex-matched value
        #   (the raw trace ID hex string) as the query to the linked datasource.
        #   This is NOT an external URL — Grafana intercepts it and uses it as
        #   the Jaeger TraceID query value.
        # datasourceUid: jaeger — makes Grafana open the internal Jaeger panel
        #   instead of navigating to an external URL.
        # Both fields are required together for the button to pre-fill the trace ID.
        - name: trace_id
          matcherRegex: '"trace_id":"(\w+)"'
          url: "$${__value.raw}"
          datasourceUid: jaeger

  # ── Jaeger — distributed traces ──────────────────────────────────────────
  # Grafana → Explore → select Jaeger → search by service / trace ID
  # Clicking a span opens the correlated Loki log lines for the same trace_id
  - name: Jaeger
    type: jaeger
    uid: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki           # trace span → Loki logs (same trace_id)
        spanStartTimeShift: "-1m"
        spanEndTimeShift: "1m"
        tags:
          - key: "job"                # propagate job label into the log query
        filterByTraceID: true
        filterBySpanID: false
        customQuery: false
